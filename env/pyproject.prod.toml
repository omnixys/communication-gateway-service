[project]
name = "omnixys-communication-gateway"
version = "0.1.0"
description = "Omnixys Communication Gateway – External Provider Integration Layer"
requires-python = ">=3.14"
dependencies = [
    "fastapi>=0.115.0",
    "strawberry-graphql[fastapi,asgi]>=0.260.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "asyncpg>=0.30.0",
    "alembic>=1.14.0",
    "pydantic>=2.0.0",
    "httpx>=0.28.0",
    "hypercorn>=0.17.0",
    "aiosmtplib>=3.0.0",
    "omnixys-config",
    "omnixys-database",
    "omnixys-kafka",
    "omnixys-observability",
    "omnixys-security",
]

[project.scripts]
gateway = "communication_gateway.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/communication_gateway"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
    "httpx>=0.28.0",
    "websockets>=15.0.0",
    "aiosqlite>=0.20.0",
    "ruff>=0.15.17",
    "mypy>=1.18.2",
    "respx>=0.22.0",
    "pytest-mock>=3.14.0",
]

[tool.uv]
package = true

[tool.uv.sources]
omnixys-config = { index = "https://pypi.org/simple/" }
omnixys-database = { index = "https://pypi.org/simple/" }
omnixys-kafka = { index = "https://pypi.org/simple/" }
omnixys-observability = { index = "https://pypi.org/simple/" }
omnixys-security = { index = "https://pypi.org/simple/" }

[tool.ruff]
line-length = 120
target-version = "py314"

[tool.ruff.lint]
select = ["ALL"]

[tool.ruff.lint.per-file-ignores]
"src/**/tests/**" = [
    "ANN101", "ANN401", "S101", "SLF001", "PLR2004",
    "T20", "FBT", "D", "INP001",
    "DTZ001", "PT011", "PT006", "PLC0415", "S106", "B017",
    "RET504",
]
"src/**" = [
    "D", "ANN401", "ARG002", "S104", "S105", "S107",
    "BLE001", "PLW0603", "PLC0415", "TRY003", "TRY300",
    "ARG001", "FBT001", "PLR0911", "B008", "FAST002",
    "S106", "S110", "S112", "C901",
]

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
python_version = "3.14"
strict = true
warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
plugins = ["sqlalchemy.ext.mypy.plugin"]

[[tool.mypy.overrides]]
module = [
    "aiokafka.*",
    "aiosmtplib.*",
    "opentelemetry.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["src/communication_gateway/tests"]
pythonpath = ["src"]
