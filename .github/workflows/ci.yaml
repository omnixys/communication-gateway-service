# Omnixys Workflow Suite – ci.yml
# Purpose: Continuous Integration pipeline for all pushes and pull requests.
# Language: Python (uv)

name: Continuous Integration – Omnixys

on:
  push:
    branches:
      - main
      - '!release'
  pull_request:
    branches:
      - '**'
      - '!release'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read
  issues: write
  pull-requests: write

env:
  COSIGN_EXPERIMENTAL: 'true'
  IMAGE_NAME: ${{ secrets.DOCKER_USER }}/${{ vars.SERVICE }}-service
  IMAGE_NAME_REPOSITORY: ghcr.io/${{ github.repository }}
  PYTHON_VERSION: '3.14'

jobs:
  ci:
    name: Run Lint, Typecheck and Tests
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, 'chore(release)') &&
      !contains(github.event.head_commit.message, 'chore(version)') &&
      !contains(github.event.head_commit.message, 'docs(changelog)')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint check
        run: uv run ruff check src/

      - name: Typecheck
        run: uv run mypy src/

      # - name: Run tests
      #   run: uv run pytest --tb=short -q

  release:
    name: 🚀 Release (semantic-release)
    needs: ci
    if: github.ref == 'refs/heads/main'
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.read_version.outputs.version }}
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 📦 Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: 🚀 Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx semantic-release | tee log.txt

          if grep -q "Published release" log.txt; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: 🏷️ Read version
        id: read_version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          DATE=$(date -u +'%Y-%m-%d')

          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV
          echo "CURRENT_DATE=$DATE" >> $GITHUB_ENV

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Update repo variable
        env:
          GH_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
        run: |
          gh variable set CURRENT_VERSION \
            --body "$CURRENT_VERSION" \
            --repo omnixys/${{ vars.SERVICE }}-service

      - name: Update org variable
        env:
          GH_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
        run: |
          gh variable set CURRENT_DATE \
            --body "$CURRENT_DATE" \
            --org omnixys \
            --visibility all

  push-docker:
    needs: release
    if: needs.release.outputs.released == 'true'
    env:
      CURRENT_VERSION: ${{ needs.release.outputs.version }}
    name: Build & Push Multi-Arch Images (Docker)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Docker tag already exists
        id: check_tag
        run: |
          set -e

          echo "Checking if tag exists: $IMAGE_NAME:${CURRENT_VERSION}"

          if docker manifest inspect "$IMAGE_NAME:${CURRENT_VERSION}" > /dev/null 2>&1; then
            echo "Tag exists → skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist → build required"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build and Push Docker Image (Multi-Arch)
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.description=Omnixys Microservice – ${{ env.IMAGE_NAME }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
          build-args: |
            REVISION=${{ github.sha }}
            CREATED=${{ vars.CURRENT_DATE }}
            APP_VERSION=${{ needs.release.outputs.version }}
            APP_NAME=${{ vars.SERVICE }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image with cosign (OIDC/GitHub)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cosign sign --yes --recursive ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.version }}
          cosign sign --yes --recursive ${{ env.IMAGE_NAME }}:latest

  push-github:
    needs: release
    if: needs.release.outputs.released == 'true'
    env:
      CURRENT_VERSION: ${{ needs.release.outputs.version }}
    name: Build & Push Multi-Arch Images (Github)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check if Docker tag already exists
        id: check_tag
        run: |
          set -e

          echo "Checking if tag exists: $IMAGE_NAME:${CURRENT_VERSION}"

          if docker manifest inspect "$IMAGE_NAME:${CURRENT_VERSION}" > /dev/null 2>&1; then
            echo "Tag exists → skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Tag does not exist → build required"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
          driver-opts: image=moby/buildkit:latest

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Cache
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ github.sha }}
          restore-keys: |
            buildx-

      - name: Build and Push Docker Image (GHCR)
        if: steps.check_tag.outputs.exists == 'false'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.IMAGE_NAME_REPOSITORY }}:${{ needs.release.outputs.version }}
            ${{ env.IMAGE_NAME_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.description=Omnixys Microservice – ${{ env.IMAGE_NAME }}
            org.opencontainers.image.licenses=GPL-3.0-or-later
          build-args: |
            REVISION=${{ github.sha }}
            CREATED=${{ vars.CURRENT_DATE }}
            APP_VERSION=${{ needs.release.outputs.version }}
            APP_NAME=${{ vars.SERVICE }}
            PYTHON_VERSION=${{ env.PYTHON_VERSION }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker Image with cosign (OIDC/GitHub)
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          cosign sign --yes --recursive ${{ env.IMAGE_NAME_REPOSITORY }}:${{ needs.release.outputs.version }}
          cosign sign --yes --recursive ${{ env.IMAGE_NAME_REPOSITORY }}:latest
